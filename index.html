
<!DOCTYPE html>
<html>
<head>
<title>Institución - Sistema Base</title>
</head>
<body>
<h2>Sistema Institucional</h2>

<input id="user" placeholder="Usuario">
<input id="pass" placeholder="Contraseña" type="password">
<button onclick="login()">Entrar</button>

<h3>Chat</h3>
<input id="msg">
<button onclick="send()">Enviar</button>

<ul id="chat"></ul>

<script src="/socket.io/socket.io.js"></script>
<script>
const socket = io();

function login() {
  fetch('/login', {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({
      username: user.value,
      password: pass.value
    })
  }).then(r=>r.json()).then(console.log);
}

socket.on('mensaje', (msg)=>{
  const li = document.createElement('li');
  li.textContent = msg;
  chat.appendChild(li);
});

function send() {
  socket.emit('mensaje', msg.value);
}
</script>

</body>
</html>
